<!DOCTYPE html>
<html>
<head>
<style>
/* COLE SEU CSS AQUI OU USE ESTE */
.galeria-dupla {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  max-width: 900px;
  margin: 20px auto;
  padding: 20px;
}

.coluna {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.foto {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}

.foto:hover {
  transform: scale(1.05);
}

/* Mobile */
@media (max-width: 768px) {
  .galeria-dupla {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="galeria-dupla">
  <!-- ESQUERDA: 3 fotos -->
  <div class="coluna">
    <img src="https://via.placeholder.com/400x250/FF6B6B/FFFFFF?text=1" class="foto" alt="Foto 1">
    <img src="https://via.placeholder.com/400x250/4ECDC4/FFFFFF?text=2" class="foto" alt="Foto 2">
    <img src="https://via.placeholder.com/400x250/45B7D1/FFFFFF?text=3" class="foto" alt="Foto 3">
  </div>
  
  <!-- DIREITA: 3 fotos -->
  <div class="coluna">
    <img src="https://via.placeholder.com/400x250/96CEB4/FFFFFF?text=4" class="foto" alt="Foto 4">
    <img src="https://via.placeholder.com/400x250/FECA57/FFFFFF?text=5" class="foto" alt="Foto 5">
    <img src="https://via.placeholder.com/400x250/FF9FF3/FFFFFF?text=6" class="foto" alt="Foto 6">
  </div>
</div>

</body>
</html>
